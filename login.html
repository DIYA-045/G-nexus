<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 28px;
        }

        .login-box p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: #1a1a2e;
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }

        .error-msg {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .success-msg {
            color: green;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🎓 Student Portal</h2>
        <p>Login with your college credentials</p>

        <div class="mb-3">
            <label class="form-label fw-bold">Roll Number</label>
            <input type="text" class="form-control" id="rollno" placeholder="Enter your Roll Number">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your Password">
        </div>

        <button class="btn btn-login" onclick="login()">Login</button>

        <div class="loader" id="loader">⏳ Logging in...</div>
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
    </div>

    <script>
        function login() {
            const rollno = document.getElementById('rollno').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const loader = document.getElementById('loader');

            // Clear previous messages
            errorMsg.innerText = '';
            successMsg.innerText = '';

            // Validation
            if(rollno === '') {
                errorMsg.innerText = '⚠️ Please enter your Roll Number!';
                return;
            }
            if(password === '') {
                errorMsg.innerText = '⚠️ Please enter your Password!';
                return;
            }

            // Show loader
            loader.style.display = 'block';

            // Send to Flask backend
            fetch('http://localhost:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rollno, password })
            })
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if(data.success) {
                    successMsg.innerText = '✅ Login Successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    errorMsg.innerText = '❌ Invalid Roll Number or Password!';
                }
            })
            .catch(err => {
                loader.style.display = 'none';
                errorMsg.innerText = '🔴 Server not running! Start Flask first.';
            });
        }

        // Login on Enter key press
        document.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
